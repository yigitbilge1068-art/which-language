# AI Codex Configuration
# This file defines the available AI codexes for the benchmark

codexes:
  claude:
    enabled: true
    class: ClaudeCodex
    config:
      # Path additions for Go, npm, etc.
      # This will be expanded to actual home directory path
      extra_path: "$HOME/.local/go/bin:$HOME/.local/npm/bin"

  gemini:
    enabled: false
    class: GeminiCodex
    config:
      # Get your API key from https://ai.google.dev/
      api_key: "${GOOGLE_API_KEY}"  # Or set directly: "your-api-key-here"
      model: "gemini-3.1-flash-lite-preview"
      cooldown_seconds: 1.2

  aider:
    enabled: true
    class: AiderCodex
    config:
      # Get your API key from https://ai.google.dev/
      gemini_api_key: "[Your API key here]"
      model: gemini/gemini-2.5-pro

  openai:
    enabled: false
    class: OpenAICodex
    config:
      # Get your API key from https://platform.openai.com/
      api_key: "${OPENAI_API_KEY}"
      model: "gpt-4.1"
      organization: "${OPENAI_ORG_ID}"  # Optional
      project: "${OPENAI_PROJECT_ID}"  # Optional
      cooldown_seconds: 0.5
      timeout_seconds: 1200
      # Optional explicit pricing for cost accounting (USD / 1M tokens):
      # price_input_1m: 0.0
      # price_cached_input_1m: 0.0
      # price_output_1m: 0.0
  
  groq:
    enabled: true
    class: GroqCodex
    config:
      # Get your API key from https://console.groq.com/
      api_key: "${GROQ_API_KEY}"
      model: "moonshotai/kimi-k2-instruct-0905"
      cooldown_seconds: 1.5

  # =========================================================================
  # PLANNED CODEXES (Templates - uncomment and configure to enable)
  # =========================================================================

  # DeepSeek (V3.2, R1)
  # Priority: HIGH | Status: Planned
  # Cost: $0.27/1M tokens (cheapest!) | Free tier: Yes (limited)
  # deepseek:
  #   enabled: false
  #   class: DeepSeekCodex
  #   config:
  #     api_key: "${DEEPSEEK_API_KEY}"
  #     model: "deepseek-v3.2"  # Options: deepseek-v3.2, deepseek-r1
  #     api_endpoint: "https://api.deepseek.com/v1"

  # Qwen (3 Coder, 3.5)
